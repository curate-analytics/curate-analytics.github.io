<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0B1F3A"/>
      <stop offset="100%" stop-color="#061229"/>
    </linearGradient>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M 48 0 L 0 0 0 48" fill="none" stroke="#1E4D8C" stroke-width="0.5" opacity="0.35"/>
    </pattern>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Brand mark -->
  <g transform="translate(96 120)">
    <rect width="88" height="88" rx="18" fill="#C8932A"/>
    <path d="M64 28a26 26 0 1 0 0 32" fill="none" stroke="#0B1F3A" stroke-width="10" stroke-linecap="round"/>
    <circle cx="66" cy="44" r="7" fill="#0B1F3A"/>
  </g>

  <!-- Wordmark -->
  <text x="208" y="180" fill="#F7F8FA" font-family="Fraunces, Georgia, serif"
        font-size="62" font-weight="700" letter-spacing="-1.5">CURATE</text>
  <text x="208" y="222" fill="#C8932A" font-family="Inter, system-ui, sans-serif"
        font-size="22" font-weight="500" letter-spacing="6">G R C A</text>

  <!-- Headline -->
  <text x="96" y="360" fill="#F7F8FA" font-family="Fraunces, Georgia, serif"
        font-size="84" font-weight="600" letter-spacing="-2">Turning uncertainty</text>
  <text x="96" y="450" fill="#C8932A" font-family="Fraunces, Georgia, serif"
        font-size="84" font-weight="600" letter-spacing="-2" font-style="italic">into opportunity.</text>

  <!-- Footer strip -->
  <line x1="96" y1="520" x2="1104" y2="520" stroke="#1E4D8C" stroke-width="1"/>
  <text x="96" y="560" fill="#94A3B8" font-family="Inter, system-ui, sans-serif"
        font-size="22" letter-spacing="2">RISK · GOVERNANCE · COMPLIANCE · ANALYTICS</text>
  <text x="96" y="592" fill="#94A3B8" font-family="JetBrains Mono, ui-monospace, monospace"
        font-size="18">curateanalytics.cseco.co.ke</text>
</svg>
